python: ${oc.env:PYTHON,python}
project_root: ${oc.env:PROJECT_ROOT,.}
verl_entry: verl.trainer.main_ppo

train_file: ${project_root}/data/rl/fdg_builder/train.parquet
val_file: ${project_root}/data/rl/fdg_builder/val.parquet
reward_config_path: ${project_root}/configs/rl/fdg_reward.yaml
reward_fn_path: ${project_root}/proofflow/rl_fdg/reward_fn.py

overrides:
  - algorithm.adv_estimator=grpo
  - data.train_files=['${train_file}']
  - data.val_files=['${val_file}']
  - data.train_batch_size=32
  - data.val_batch_size=32
  - data.max_prompt_length=8192
  - data.max_response_length=8192
  - data.filter_overlong_prompts=True
  - data.truncation=error
  - actor_rollout_ref.model.path=${oc.env:BUILDER_MODEL_PATH,/root/autodl-tmp/models/Qwen3-32B}
  - actor_rollout_ref.model.enable_gradient_checkpointing=True
  - actor_rollout_ref.model.use_remove_padding=True
  - actor_rollout_ref.model.lora_rank=${oc.env:RL_LORA_RANK,64}
  - actor_rollout_ref.model.lora_alpha=${oc.env:RL_LORA_ALPHA,64}
  - actor_rollout_ref.model.target_modules=all-linear
  - actor_rollout_ref.actor.optim.lr=${oc.env:RL_LEARNING_RATE,1e-6}
  - actor_rollout_ref.actor.ppo_mini_batch_size=16
  - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1
  - actor_rollout_ref.actor.use_kl_loss=True
  - actor_rollout_ref.actor.kl_loss_coef=${oc.env:RL_KL_COEF,0.001}
  - actor_rollout_ref.actor.kl_loss_type=low_var_kl
  - actor_rollout_ref.actor.entropy_coeff=0.0
  - actor_rollout_ref.actor.fsdp_config.param_offload=False
  - actor_rollout_ref.actor.fsdp_config.optimizer_offload=False
  - actor_rollout_ref.rollout.name=vllm
  - actor_rollout_ref.rollout.tensor_model_parallel_size=${oc.env:RL_ROLLOUT_TP,2}
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.65
  - actor_rollout_ref.rollout.n=4
  - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1
  - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=1
  - reward.reward_manager.name=batch
  - reward.reward_manager.source=register
  - reward.custom_reward_function.path=${reward_fn_path}
  - reward.custom_reward_function.name=compute_score
  - reward.custom_reward_function.reward_kwargs.reward_config_path=${reward_config_path}
  - algorithm.use_kl_in_reward=False
  - trainer.critic_warmup=0
  - trainer.logger=["console"]
  - trainer.project_name=step_proof_fdg_grpo
  - trainer.experiment_name=fdg_builder_grpo
  - trainer.n_gpus_per_node=${oc.env:RL_NUM_GPUS,6}
  - trainer.nnodes=1
  - trainer.save_freq=20
  - trainer.test_freq=10
  - trainer.total_epochs=1
