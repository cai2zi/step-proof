weights:
  invalid_json_penalty: -1.0
  invalid_fdg_penalty: -0.6
  valid_json_bonus: 0.05
  validator_pass_bonus: 0.15
  formalizer_pass_weight: 0.4
  prover_pass_weight: 0.2
  final_answer_pass_weight: 0.2
  warning_penalty: 0.01

runtime:
  include_prover: true
  fdg_prompt: fdg_origin4
  scheduler:
    graph_wait_ms: 200
    max_graph_batch_size: 2048
    max_pending_graphs: 8192
    runtime_actor_max_concurrency: 256
    formalizer_wait_ms: 500
    prover_wait_ms: 200
  formalizer:
    model_path: /root/autodl-tmp/models/Goedel-Formalizer-V2-8B
    gpus: "3"
    tensor_parallel_size: 1
    num_workers: 1
    gpu_memory_utilization: 0.95
    max_tokens: 8192
    token_limit: 32768
    temperature: 0.0
    top_p: 1.0
    presence_penalty: 0.0
    frequency_penalty: 0.0
    seed: 42
    top_k: 20
    retries: 1
    batch_size: 2048
    prompt_name: formalize_obligation.paper_goedel_v2
    chat_template_kwargs:
      enable_thinking: true
  prover:
    model_path: /root/autodl-tmp/models/Goedel-Prover-V2-8B
    gpus: "0,1,2"
    tensor_parallel_size: 1
    num_workers: 3
    gpu_memory_utilization: 0.95
    max_tokens: 4096
    token_limit: 8192
    temperature: 0.0
    top_p: 1.0
    presence_penalty: 0.0
    frequency_penalty: 0.0
    seed: 42
    top_k: 20
    retries: 1
    batch_size: 2048
    prompt_name: prove.paper_goedel_v2
    chat_template_kwargs:
      enable_thinking: true
  lean:
    mathlib_path: /root/autodl-tmp/mathlib4
    backend: persistent_lsp
    check_concurrency: 128
    worker_pool_size: 0
    temp_dir: /root/autodl-tmp/step-proof/results/fdg_builder_grpo/tmp/lean_jobs
  trace:
    enabled: true
    out_dir: /root/autodl-tmp/step-proof/results/fdg_builder_grpo/cot_traces
