output_root: ${oc.env:CZX_ROOT}/czx_work/step-proof/rollout_rerank_math_verify/outputs
name: qwen3_8b_8

env:
  lean4_python: ${oc.env:LEAN4_PYTHON}

data:
  bench_path: ${oc.env:CZX_ROOT}/data_raw/bench/bench_all_normalized.parquet
  id_column: id
  question_column: question
  gold_column: gold
  source_column: source
  limit_per_source: null
  sources:
    - aime25_test
    - aime_2024
    - brumo_2025
    - cmimc_2025
    - hmmt_feb_2025
    - math_500_test
    # - gsm8k_main_test
  seed: 42

prompt:
  template: |
    Solve the following math problem. Think step by step, and make the last line exactly:
    Therefore, the final answer is: $\boxed{ANSWER}$.

    Problem:
    {question}

rollout:
  model_path: ${oc.env:CZX_ROOT}/models/Qwen3-8B
  instances: 4
  gpus: 0,1,2,3
  tensor_parallel_size: 1
  dtype: float16
  gpu_memory_utilization: 0.95
  max_model_len: 40960
  max_tokens: 32768
  n: 4
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  seed: 1234
  micro_batch_size: 4
  progress: true
  resume: true
  parallel_startup: true
  startup_stagger_seconds: 0
  chat_template_kwargs:
    enable_thinking: true
