output_root: ${oc.env:CZX_ROOT}/czx_work/step-proof/rollout_rerank_math_verify/outputs
name: reduce_prompt
rollout_name: qwen3_8b

exp:
  name: step_proof_results
  root: ${output_root}/step_proofs/step_proof_${name}

python: ${oc.env:LEAN4_PYTHON}

run:
  stages: [stage1, stage2, stage3, stats]
  resume: true
  force: false
  stream_logs_to_console: true

stage1:
  backend: vllm  # vllm | api

  
  parquet_dir: ${output_root}/rollouts/rollout_${rollout_name}
  parquet_glob: rollout_flat.parquet
  id_column: id
  question_column: question
  response_column: response
  limit: -1
  reuse_from_step_proof: reduce_prompt_API
  reuse_require_all: true

  # Shared generation settings.
  max_tokens: 16384 # output tokens
  temperature: 0.0
  top_p: 1.0
  presence_penalty: 0.0
  frequency_penalty: 0.0
  seed: 42
  
  batch_size: 32
  max_retries: 3
  fdg_prompt: fdg_origin4_reduce
  include_think_in_dag: false

  # API backend settings (OpenAI-compatible).
  #   export POLOAI_API_KEY='sk-...'   # keep API keys out of yaml
  # PoloAI (https://poloai.top):
  api_model: gpt-5-mini
  api_base_url: https://poloai.top/v1
  api_key_env: POLOAI_API_KEY
  api_concurrency: 32
  api_timeout: 300
  api_max_retries: 3
  api_retry_sleep: 2.0
  api_input_token_limit: 16384 # input tokens
  api_tokenizer_path: ${stage1.model_path}

  # vLLM backend settings.
  model_path: ${oc.env:CZX_ROOT}/models/Qwen3-8B
  token_limit: 32768 # VLLM total tokens
  vllm_instances: 4
  parallel_startup: True
  startup_stagger_seconds: 0
  startup_timeout: 1800
  tensor_parallel_size: 1
  gpus: 0,1,2,3
  dtype: float16
  gpu_memory_utilization: 0.95
  top_k: 20
  chat_template_kwargs:
    enable_thinking: true

lean_runtime:
  mathlib_path: ${oc.env:CZX_ROOT}/mathlib4
  lean_backend: persistent_lsp
  lean_check_concurrency: 16
  lean_worker_pool_size: 0
  lean_temp_dir: ${oc.env:CZX_ROOT}/czx_work/TEMP/lean_jobs/${name}

stage2:
  gpus: 0
  dtype: float16
  gpu_memory_utilization: 0.95
  batch_wait_ms: 200
  max_pending_validation_batches: 8
  formalizer_model_path: ${oc.env:CZX_ROOT}/models/Goedel-Formalizer-V2-32B
  formalizer_instances: 1
  formalizer_parallel_startup: True
  formalizer_startup_stagger_seconds: 0
  formalizer_startup_timeout: 1800
  formalizer_tensor_parallel_size: 1
  formalizer_max_tokens: 8192
  formalizer_token_limit: 32768
  formalizer_temperature: 0.0
  formalizer_top_p: 1.0
  formalizer_presence_penalty: 0.0
  formalizer_frequency_penalty: 0.0
  formalizer_seed: 42
  formalizer_top_k: 20
  formalizer_chat_template_kwargs:
    enable_thinking: true
  formalizer_prompt: formalize_obligation.paper_goedel_v2
  formalizer_retries: 3
  form_batch_size: 128
  limit: -1

stage3:
  gpus: 0
  dtype: float16
  gpu_memory_utilization: 0.95
  batch_wait_ms: 200
  max_pending_validation_batches: 8
  prover_model_path: ${oc.env:CZX_ROOT}/models/Goedel-Prover-V2-8B
  prover_instances: 1
  prover_parallel_startup: True
  prover_startup_stagger_seconds: 0
  prover_startup_timeout: 1800
  prover_tensor_parallel_size: 1
  prover_max_tokens: 4096
  prover_token_limit: 8192
  prover_temperature: 0.0
  prover_top_p: 1.0
  prover_presence_penalty: 0.0
  prover_frequency_penalty: 0.0
  prover_seed: 42
  prover_top_k: 20
  prover_chat_template_kwargs:
    enable_thinking: true
  prover_prompt: prove.paper_goedel_v2
  prover_retries: 0
  prove_batch_size: 128
  limit: -1

stats:
  top_n_per_bucket: 100
  show_ids: true

cot_trace:
  include_attempt_history: true

viz:
  enabled: false
  buckets: []
  top_n: 0
  source: results
  graph_only: false
  seed: 42

hydra:
  run:
    dir: ${exp.root}/${exp.name}
  output_subdir: .hydra
  job:
    chdir: false
