output_root: /root/autodl-tmp/step-proof/experiments/rollout_rerank_math_verify/outputs
name: reduce_prompt
rollout_name: qwen3_8b_8

exp:
  name: step_proof_results
  root: ${output_root}/step_proofs/step_proof_${name}

python: ${oc.env:PYTHON,/root/autodl-tmp/env/lean4/bin/python}

run:
  stages: [stage1, stage2, stage3, stats]
  resume: true
  force: false
  stream_logs_to_console: true

stage1:
  parquet_dir: ${output_root}/rollouts/rollout_${rollout_name}
  parquet_glob: rollout_flat.parquet
  id_column: id
  question_column: question
  response_column: response
  limit: -1
  model_path: /root/autodl-tmp/models/Qwen3-8B
  vllm_instances: 2
  parallel_startup: True
  startup_stagger_seconds: 0
  startup_timeout: 1800
  tensor_parallel_size: 1
  gpus: 0,1
  dtype: float16
  gpu_memory_utilization: 0.95
  max_tokens: 8192
  temperature: 0.0
  top_p: 1.0
  presence_penalty: 0.0
  frequency_penalty: 0.0
  seed: 42
  top_k: 20
  token_limit: 32768
  chat_template_kwargs:
    enable_thinking: true
  batch_size: 16
  max_retries: 3
  fdg_prompt: fdg_origin4_reduce
  include_think_in_dag: false

lean_runtime:
  mathlib_path: /root/autodl-tmp/mathlib4
  lean_backend: persistent_lsp
  lean_check_concurrency: 128
  lean_worker_pool_size: 0
  lean_temp_dir: lean_jobs_shared

stage2:
  gpus: 0,1
  dtype: float16
  gpu_memory_utilization: 0.95
  batch_wait_ms: 200
  max_pending_validation_batches: 8
  formalizer_model_path: /root/autodl-tmp/models/Goedel-Formalizer-V2-8B
  formalizer_instances: 2
  formalizer_parallel_startup: False
  formalizer_startup_stagger_seconds: 0
  formalizer_startup_timeout: 1800
  formalizer_tensor_parallel_size: 1
  formalizer_max_tokens: 8192
  formalizer_token_limit: 32768
  formalizer_temperature: 0.0
  formalizer_top_p: 1.0
  formalizer_presence_penalty: 0.0
  formalizer_frequency_penalty: 0.0
  formalizer_seed: 42
  formalizer_top_k: 20
  formalizer_chat_template_kwargs:
    enable_thinking: true
  formalizer_prompt: formalize_obligation.paper_goedel_v2
  formalizer_retries: 3
  form_batch_size: 64
  limit: -1

stage3:
  gpus: 0,1
  dtype: float16
  gpu_memory_utilization: 0.95
  batch_wait_ms: 200
  max_pending_validation_batches: 8
  prover_model_path: /root/autodl-tmp/models/Goedel-Prover-V2-8B
  prover_instances: 2
  prover_parallel_startup: False
  prover_startup_stagger_seconds: 0
  prover_startup_timeout: 1800
  prover_tensor_parallel_size: 1
  prover_max_tokens: 4096
  prover_token_limit: 8192
  prover_temperature: 0.0
  prover_top_p: 1.0
  prover_presence_penalty: 0.0
  prover_frequency_penalty: 0.0
  prover_seed: 42
  prover_top_k: 20
  prover_chat_template_kwargs:
    enable_thinking: true
  prover_prompt: prove.paper_goedel_v2
  prover_retries: 1
  prove_batch_size: 128
  limit: -1

stats:
  top_n_per_bucket: 100
  show_ids: true

cot_trace:
  include_attempt_history: true

viz:
  enabled: false
  buckets: []
  top_n: 0
  source: results
  graph_only: false
  seed: 42

hydra:
  run:
    dir: ${exp.root}/${exp.name}
  output_subdir: .hydra
  job:
    chdir: false
